name: Docs Lint

on:
  pull_request:
    paths:
      - "docs/**"
      - "AGENTS.md"
      - "README.md"
      - "scripts/lint-docs.mjs"
      - "package.json"
      - ".github/workflows/docs-lint.yml"
  push:
    # All branches — enables solo "push to feature branch → wait for CI →
    # fast-forward main" flow without requiring a PR for every tiny change.
    paths:
      - "docs/**"
      - "AGENTS.md"
      - "README.md"
      - "scripts/lint-docs.mjs"
      - "package.json"
      - ".github/workflows/docs-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run docs linter
        run: node scripts/lint-docs.mjs
